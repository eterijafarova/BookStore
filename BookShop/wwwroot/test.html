<!DOCTYPE html>
<html>
<head>
    <title>SignalR Test</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/7.0.5/signalr.min.js"></script>
</head>
<body>

<h2>SignalR Chat Test</h2>

<input id="token" placeholder="JWT Token" />
<br><br>

<input id="chatId" placeholder="ChatId" />
<input id="message" placeholder="Message" />

<br><br>

<button onclick="connect()">Connect</button>
<button onclick="join()">Join Chat</button>
<button onclick="send()">Send</button>

<ul id="messages"></ul>

<script>
    let connection;

    function connect() {
        const token = document.getElementById("token").value;

        connection = new signalR.HubConnectionBuilder()
            .withUrl("http://localhost:13779/supportHub", {
                accessTokenFactory: () => token
            })
            .build();

        connection.on("ReceiveMessage", (userId, message) => {
            const li = document.createElement("li");
            li.innerText = userId + ": " + message;
            document.getElementById("messages").appendChild(li);
        });

        connection.start()
            .then(() => console.log("Connected"))
            .catch(err => console.error(err));
    }

    function join() {
        const chatId = document.getElementById("chatId").value;
        connection.invoke("JoinChat", chatId);
    }

    function send() {
        const chatId = document.getElementById("chatId").value;
        const message = document.getElementById("message").value;
        connection.invoke("SendMessage", chatId, message);
    }
</script>

</body>
</html>
