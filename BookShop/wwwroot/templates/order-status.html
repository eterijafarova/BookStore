<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <style>

        body{
            margin:0;
            padding:40px;

            background:
                    radial-gradient(circle at top,
                    #24103f 0%,
                    #12051f 45%,
                    #05010d 100%);

            font-family:Poppins,Arial,sans-serif;

            color:white;
        }

        .container{

            max-width:700px;

            margin:auto;

            background:
                    linear-gradient(
                            180deg,
                            rgba(18,6,35,.98),
                            rgba(12,3,24,.98));

            border-radius:36px;

            overflow:hidden;

            border:
                    1px solid rgba(192,132,252,.12);

            box-shadow:
                    0 0 60px rgba(168,85,247,.18);
        }

        .content{

            padding:60px;
        }

        .logo{

            font-size:48px;

            font-weight:800;

            color:#f7a8ff;

            text-align:center;

            margin-bottom:15px;
        }

        .subtitle{

            text-align:center;

            color:rgba(255,255,255,.35);

            letter-spacing:4px;

            font-size:13px;

            margin-bottom:50px;
        }

        .hello{

            font-size:20px;

            margin-bottom:25px;
        }

        .hello span{

            color:#ff9de2;

            font-weight:700;
        }

        .description{

            color:rgba(255,255,255,.65);

            line-height:2;

            margin-bottom:40px;
        }

        .status-card{

            padding:40px;

            border-radius:30px;

            background:
                    linear-gradient(
                            135deg,
                            rgba(168,85,247,.15),
                            rgba(255,255,255,.02));

            border:
                    1px solid rgba(255,157,226,.15);

            text-align:center;
        }

        .status-title{

            letter-spacing:4px;

            font-size:13px;

            color:rgba(255,255,255,.45);

            margin-bottom:25px;
        }

        .status{

            display:inline-block;

            padding:18px 38px;

            border-radius:100px;

            background:
                    linear-gradient(
                            135deg,
                            rgba(168,85,247,.25),
                            rgba(255,157,226,.15));

            color:#ffb0eb;

            font-size:24px;

            font-weight:700;
        }

        .tracking{

            margin-top:40px;

            text-align:center;
        }

        .tracking-title{

            color:rgba(255,255,255,.4);

            letter-spacing:4px;

            font-size:13px;

            margin-bottom:20px;
        }

        .tracking-number{

            display:inline-block;

            padding:16px 32px;

            border-radius:20px;

            background:
                    rgba(255,255,255,.05);

            border:
                    1px solid rgba(255,255,255,.08);

            color:#d8b4fe;

            font-size:18px;

            font-weight:700;

            letter-spacing:2px;

            box-shadow:
                    inset 0 0 20px rgba(255,255,255,.02);
        }

        .footer{

            margin-top:60px;

            text-align:center;

            color:rgba(255,255,255,.25);

            line-height:2;
        }

    </style>

</head>
<body>

<div class="container">

    <div class="content">

        <div class="logo">
            Cheshire BookShop
        </div>

        <div class="subtitle">
            SOME STORIES NEVER TRULY END
        </div>

        <div class="hello">
            Hello,
            <span>{{UserName}}</span>
        </div>

        <div class="description">

            {{StatusText}}

        </div>

        <div class="status-card">

            <div class="status-title">
                ORDER STATUS HAS BEEN CHANGED
            </div>

            <div class="status">

                {{Status}}

            </div>

            <div class="tracking">

                <div class="tracking-title">
                    TRACKING NUMBER
                </div>

                <div class="tracking-number">

                    {{TrackingNumber}}

                </div>

            </div>

        </div>

        <div class="footer">

            Cheshire BookShop

            <br><br>

            Some stories wait for us even after the final page.

        </div>

    </div>
</div>

</body>
</html>
