<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Confirmed</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:Segoe UI,sans-serif;
            background:linear-gradient(135deg,#2d1f4d,#5a3f85);
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
            padding:20px;
        }

        .card{
            width:420px;
            background:#faf7f0;
            border-radius:18px;
            padding:35px;
            position:relative;
            box-shadow:0 15px 40px rgba(0,0,0,.25);
        }

        .stamp{
            position:absolute;
            top:20px;
            right:20px;
            width:95px;
            padding:6px;
            background:white;
            border:2px dashed #caa85a;
            transform:rotate(8deg);
            box-shadow:0 6px 15px rgba(0,0,0,.2);
        }

        .stamp img{
            width:100%;
            display:block;
        }

        .postmark{
            position:absolute;
            top:40px;
            right:5px;
            width:95px;
            height:95px;
            border:2px solid rgba(120,80,40,.45);
            border-radius:50%;
            transform:rotate(-18deg);
            font-size:11px;
            color:#7b5d2d;
            display:flex;
            justify-content:center;
            align-items:center;
            pointer-events:none;
        }

        h1{
            color:#4b2c6d;
            margin-bottom:15px;
        }

        p{
            color:#555;
            line-height:1.6;
            margin-bottom:30px;
        }

        .promo{
            background:#f5df8f;
            border-radius:10px;
            padding:15px;
            text-align:center;
        }

        .promo small{
            display:block;
            color:#555;
            margin-bottom:6px;
        }

        .code{
            font-size:24px;
            font-weight:bold;
            letter-spacing:3px;
            color:#6b3fa0;
        }
    </style>

</head>
<body>

<div class="card">

    <div class="stamp">
        <img src="/images/email-confirmed.png" alt="Cheshire Stamp">
    </div>

    <div class="postmark">
        CHESHIRE<br>POST
    </div>

    <h1>✨ Email Confirmed!</h1>

    <p>
        Welcome to <strong>Cheshire Shelf</strong>.<br>
        Your email has been successfully verified, and the library doors are now open.
        Enjoy your first magical discount!
    </p>

    <div class="promo">
        <small>Your Promo Code</small>
        <div class="code">CHESHIRE25</div>
    </div>

</div>

</body>
</html>
