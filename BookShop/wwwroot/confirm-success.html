<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Confirmed</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:"Segoe UI",sans-serif;
            background:radial-gradient(circle at top,#644b99,#3d2a63 75%);
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
            padding:25px;
        }

        .card{
            position:relative;
            width:650px;
            max-width:95%;
            background:linear-gradient(#fffdf9,#f5efe2);
            border:2px solid #d8c59d;
            border-radius:14px;
            padding:45px;
            box-shadow:0 20px 45px rgba(0,0,0,.28);
        }

        .card::before{
            content:"";
            position:absolute;
            inset:12px;
            border:1px solid #dbc89f;
            pointer-events:none;
        }

        .stamp{
            position:absolute;
            top:18px;
            right:22px;
            width:135px;
            padding:6px;
            background:#fff;
            border:2px dashed #caa85a;
            transform:rotate(8deg);
            box-shadow:0 8px 18px rgba(0,0,0,.2);
        }

        .stamp img{
            width:100%;
            display:block;
            border:1px solid #d3b06a;
        }

        .postmark{
            position:absolute;
            top:40px;
            right:5px;
            width:135px;
            height:135px;
            border:2px solid rgba(126,93,43,.45);
            border-radius:50%;
            display:flex;
            justify-content:center;
            align-items:center;
            text-align:center;
            color:#8a6937;
            font-size:15px;
            font-weight:bold;
            opacity:.45;
            transform:rotate(-18deg);
            pointer-events:none;
        }

        .address{
            position:absolute;
            right:180px;
            top:40px;
            text-align:right;
            color:#8a6937;
            font-size:13px;
            font-style:italic;
            line-height:1.5;
        }

        h1{
            font-family:Georgia,serif;
            color:#4b2c6d;
            font-size:48px;
            margin-bottom:22px;
        }

        p{
            width:70%;
            color:#565656;
            line-height:1.7;
            font-size:20px;
        }

        .line{
            border:none;
            border-top:1px dashed #ccb27c;
            margin:35px 0 25px;
        }

        .promo{
            background:linear-gradient(#f8e9a8,#f2d97b);
            border:2px solid #d8b45a;
            border-radius:10px;
            padding:22px;
            text-align:center;
        }

        .promo small{
            display:block;
            color:#6c5d3d;
            margin-bottom:10px;
            font-size:18px;
        }

        .code{
            font-size:42px;
            letter-spacing:5px;
            color:#6b3fa0;
            font-weight:bold;
        }

        @media(max-width:700px){

            .card{
                padding:30px 25px;
            }

            .stamp{
                width:95px;
            }

            .postmark{
                width:100px;
                height:100px;
                font-size:11px;
            }

            .address{
                display:none;
            }

            h1{
                font-size:36px;
            }

            p{
                width:100%;
                font-size:17px;
            }

            .code{
                font-size:30px;
            }

        }

    </style>

</head>
<body>

<div class="card">

    <div class="address">
        To:<br>
        Dear Reader
    </div>

    <div class="stamp">
        <img src="/images/confirmed.png" alt="Cheshire Stamp">
    </div>

    <div class="postmark">
        CHESHIRE<br>POST
    </div>

    <h1>Email Confirmed!</h1>

    <p>
        Welcome to <strong>Cheshire Shelf</strong>.<br>
        Your email has been successfully verified.
        The library doors are now open, and your first magical adventure is waiting for you.
    </p>

    <hr class="line">

    <div class="promo">
        <small>Your Magical Promo Code</small>
        <div class="code">CHESHIRE25</div>
    </div>

</div>

</body>
</html>
