<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirmation Failed</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:"Segoe UI",sans-serif;
            background:radial-gradient(circle at top,#5a467f,#35234f 75%);
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
            padding:25px;
        }

        .card{
            position:relative;
            width:650px;
            max-width:95%;
            background:linear-gradient(#fffdf9,#f5efe2);
            border:2px solid #d8c59d;
            border-radius:14px;
            padding:45px;
            box-shadow:0 20px 45px rgba(0,0,0,.28);
        }

        .card::before{
            content:"";
            position:absolute;
            inset:12px;
            border:1px solid #dbc89f;
            pointer-events:none;
        }


        .stamp{
            position:absolute;
            width:155px;
            padding:6px;
            background:#fff;
            border:2px dashed #caa85a;
            transform:rotate(8deg);
            box-shadow:0 8px 18px rgba(0,0,0,.2);
            top:65px;
            right:20px;
            z-index:5;
        }

        .postmark{
            position:absolute;

            top:105px;
            right:35px;

            padding:10px 20px;

            border:3px solid rgba(150,30,30,.45);
            color:rgba(150,30,30,.55);

            background:rgba(255,255,255,.08);

            font-family:Georgia,serif;
            font-size:15px;
            font-weight:bold;
            letter-spacing:2px;
            text-transform:uppercase;

            transform:rotate(-23deg);

            backdrop-filter:blur(.5px);

            z-index:20;
            pointer-events:none;
        }
        
        .stamp img{
            width:100%;
            display:block;
            border:1px solid #d3b06a;
        }
        

        h1{
            font-family:Georgia,serif;
            color:#8d1f1f;
            font-size:46px;
            margin-bottom:22px;
            width:65%;
            line-height:1.05;
            
        }

        p{
            width:70%;
            color:#555;
            line-height:1.7;
            font-size:19px;
        }

        .line{
            border:none;
            border-top:1px dashed #ccb27c;
            margin:35px 0;
        }

        .notice{
            background:#fff4f1;
            border:2px solid #d58b8b;
            border-radius:10px;
            padding:18px;
            color:#7a2f2f;
            text-align:center;
            font-weight:600;
        }

        @media(max-width:700px){

            .card{
                padding:30px 25px;
            }

            .stamp{
                width:95px;
            }

            .postmark{
                width:100px;
                height:100px;
                font-size:11px;
            }
            

            h1{
                font-size:34px;
            }

            p{
                width:100%;
                font-size:17px;
            }

        }

    </style>

</head>
<body>

<div class="card">
    

    <div class="stamp">
        <img src="/images/failed.png" alt="Cheshire Stamp">
    </div>

    <div class="postmark">
        LOST IN WONDERLAND
    </div>
    
    <h1>
        Confirmation<br>
        Failed
    </h1>

    <p>
        Unfortunately, this magical letter could not be delivered.
        The confirmation link is invalid or has expired.
    </p>

    <hr class="line">

    <div class="notice">
        Please request a new confirmation email and try again.
    </div>

</div>

</body>
</html>
