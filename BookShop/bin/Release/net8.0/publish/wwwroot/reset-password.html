<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Reset Password</title>

    <style>

        * {
            box-sizing: border-box;
        }

        body {

            margin: 0;

            min-height: 100vh;

            display: flex;
            justify-content: center;
            align-items: center;

            overflow-y: auto;

            padding: 20px;

            font-family: 'Poppins', sans-serif;

            background:
                    radial-gradient(circle at top,
                    #2d1459 0%,
                    #14051f 45%,
                    #05010c 100%);
        }

        body::before {

            content: "";

            position: fixed;
            inset: 0;

            background:
                    radial-gradient(circle,
                    rgba(168,85,247,0.09),
                    transparent 70%);

            filter: blur(90px);

            animation: smoke 12s infinite linear;

            pointer-events: none;
        }

        .container {

            position: relative;

            width: 560px;

            max-width: 100%;

            max-height: calc(100vh - 40px);

            overflow-y: auto;

            padding: 28px 40px;

            border-radius: 34px;

            background:
                    rgba(13, 6, 25, 0.88);

            border:
                    1px solid rgba(192,132,252,0.12);

            backdrop-filter: blur(18px);

            box-shadow:
                    0 0 45px rgba(168,85,247,0.18),
                    0 0 120px rgba(91,33,182,0.12);

            z-index: 2;
        }

        .container::-webkit-scrollbar {
            width: 0;
        }

        h2 {

            margin: 0;

            text-align: center;

            font-size: 32px;

            font-weight: 700;

            color: #d8b4fe;

            letter-spacing: 1px;

            text-shadow:
                    0 0 18px rgba(216,180,254,0.55);
        }

        .subtitle {

            margin-top: 10px;
            margin-bottom: 10px;

            text-align: center;

            color: rgba(255,255,255,0.42);

            font-size: 14px;

            letter-spacing: 1px;
        }

        .cheshire-wrapper {

            position: relative;

            width: 100%;
            height: 180px;

            display: flex;
            justify-content: center;
            align-items: center;

            margin-bottom: 10px;
        }

        .cheshire-glow {

            position: absolute;

            width: 240px;
            height: 240px;

            background:
                    radial-gradient(circle,
                    rgba(168,85,247,0.4),
                    transparent 70%);

            filter: blur(40px);

            animation: pulse 5s infinite;
        }

        .cheshire-cat {

            position: relative;

            width: 320px;

            margin-top: -15px;

            opacity: 0;

            transform:
                    translateY(10px)
                    scale(0.95);

            transition:
                    opacity 1.6s ease,
                    transform 1.6s cubic-bezier(.19,1,.22,1);

            filter:
                    drop-shadow(0 0 28px rgba(168,85,247,0.75));

            animation:
                    floatCat 5s ease-in-out infinite;
        }

        .cheshire-cat.visible {

            opacity: 1;

            transform:
                    translateY(0)
                    scale(1);
        }

        .form-group {

            margin-bottom: 18px;
        }

        label {

            display: block;

            margin-bottom: 10px;

            color: #d8b4fe;

            font-weight: 600;

            font-size: 15px;
        }

        .password-wrapper {

            position: relative;
        }

        input {

            width: 100%;

            padding: 18px 58px 18px 20px;

            border-radius: 20px;

            border:
                    1px solid rgba(192,132,252,0.18);

            background:
                    rgba(255,255,255,0.05);

            backdrop-filter: blur(12px);

            color: white;

            font-size: 16px;

            outline: none;

            transition: 0.35s;
        }

        input::placeholder {

            color: rgba(255,255,255,0.32);
        }

        input:focus {

            border-color: #c084fc;

            box-shadow:
                    0 0 20px rgba(192,132,252,0.22);
        }

        .toggle-password {

            position: absolute;

            right: 18px;
            top: 50%;

            transform: translateY(-50%);

            width: 24px;
            height: 24px;

            color: #d8b4fe;

            cursor: pointer;

            transition: 0.3s;
        }

        .toggle-password:hover {

            transform:
                    translateY(-50%)
                    scale(1.1);
        }

        button {

            position: relative;

            overflow: hidden;

            width: 100%;

            padding: 18px;

            border: none;

            border-radius: 22px;

            font-size: 19px;

            font-weight: 700;

            color: white;

            cursor: pointer;

            background:
                    linear-gradient(
                            135deg,
                            #7c3aed,
                            #9333ea,
                            #c084fc
                    );

            box-shadow:
                    0 0 30px rgba(147,51,234,0.35);

            transition: 0.4s;
        }

        button::before {

            content: "";

            position: absolute;
            inset: 0;

            border-radius: inherit;

            background:
                    linear-gradient(
                            90deg,
                            transparent,
                            rgba(255,255,255,0.18),
                            transparent
                    );

            transform: translateX(-100%);

            transition: 0.8s;
        }

        button:hover::before {

            transform: translateX(100%);
        }

        button:hover {

            transform:
                    translateY(-2px)
                    scale(1.01);

            box-shadow:
                    0 0 45px rgba(192,132,252,0.55);
        }

        .error {

            margin-top: 18px;

            color: #ff8ac2;

            text-align: center;

            font-size: 14px;
        }

        @keyframes floatCat {

            0%,100% {

                transform:
                        translateY(0px)
                        scale(1);
            }

            50% {

                transform:
                        translateY(-8px)
                        scale(1.02);
            }
        }

        @keyframes pulse {

            0%,100% {

                opacity: 0.45;

                transform: scale(1);
            }

            50% {

                opacity: 0.95;

                transform: scale(1.14);
            }
        }

        @keyframes smoke {

            0% {

                transform: translateX(-15px);
            }

            50% {

                transform: translateX(15px);
            }

            100% {

                transform: translateX(-15px);
            }
        }

    </style>
</head>

<body>

<div class="container">

    <h2>Reset Password</h2>

    <div class="subtitle">
        The Cheshire Cat is watching your secrets...
    </div>

    <div class="cheshire-wrapper">

        <div class="cheshire-glow"></div>

        <img
                src="/images/cheshire.png"
                class="cheshire-cat"
                id="cheshireCat"
                alt="Cheshire Cat"/>

    </div>

    <form id="resetPasswordForm">

        <div class="form-group">

            <label for="newPassword">
                New Password
            </label>

            <div class="password-wrapper">

                <input
                        type="password"
                        id="newPassword"
                        placeholder="Enter your new password"
                        required/>

                <span
                        class="toggle-password"
                        id="togglePassword">

                    <svg xmlns="http://www.w3.org/2000/svg"
                         fill="none"
                         viewBox="0 0 24 24"
                         stroke-width="1.8"
                         stroke="currentColor">

                        <path stroke-linecap="round"
                              stroke-linejoin="round"
                              d="M2.25 12s3.75-7.5 9.75-7.5S21.75 12 21.75 12s-3.75 7.5-9.75 7.5S2.25 12 2.25 12z"/>

                        <circle cx="12"
                                cy="12"
                                r="3"/>

                    </svg>

                </span>

            </div>

        </div>

        <div class="form-group">

            <label for="confirmPassword">
                Confirm Password
            </label>

            <input
                    type="password"
                    id="confirmPassword"
                    placeholder="Confirm your password"
                    required/>

        </div>

        <button type="submit">
            Reset Password
        </button>

        <div class="error"
             id="errorMessage">
        </div>

    </form>

</div>

<script>

    const form =
        document.getElementById("resetPasswordForm");

    const errorMessage =
        document.getElementById("errorMessage");

    const token =
        new URLSearchParams(window.location.search)
            .get('token');

    const togglePassword =
        document.getElementById("togglePassword");

    const passwordInput =
        document.getElementById("newPassword");

    const cat =
        document.getElementById("cheshireCat");

    togglePassword.addEventListener("click", () => {

        if (passwordInput.type === "password") {

            passwordInput.type = "text";

            cat.classList.add("visible");

            togglePassword.innerHTML = `
<svg xmlns="http://www.w3.org/2000/svg"
fill="none"
viewBox="0 0 24 24"
stroke-width="1.8"
stroke="currentColor">

<path stroke-linecap="round"
stroke-linejoin="round"
d="M3 3l18 18"/>

<path stroke-linecap="round"
stroke-linejoin="round"
d="M10.58 10.58A2 2 0 0013.42 13.42"/>

<path stroke-linecap="round"
stroke-linejoin="round"
d="M9.88 4.24A10.97 10.97 0 0112 4.5c6 0 9.75 7.5 9.75 7.5a15.6 15.6 0 01-4.12 4.93"/>

<path stroke-linecap="round"
stroke-linejoin="round"
d="M6.61 6.61A15.05 15.05 0 002.25 12s3.75 7.5 9.75 7.5a10.7 10.7 0 005.39-1.39"/>

</svg>
`;

        } else {

            passwordInput.type = "password";

            cat.classList.remove("visible");

            togglePassword.innerHTML = `
<svg xmlns="http://www.w3.org/2000/svg"
fill="none"
viewBox="0 0 24 24"
stroke-width="1.8"
stroke="currentColor">

<path stroke-linecap="round"
stroke-linejoin="round"
d="M2.25 12s3.75-7.5 9.75-7.5S21.75 12 21.75 12s-3.75 7.5-9.75 7.5S2.25 12 2.25 12z"/>

<circle cx="12"
cy="12"
r="3"/>

</svg>
`;
        }
    });

    form.addEventListener('submit',
        async function (event) {

            event.preventDefault();

            const newPassword =
                document.getElementById("newPassword").value;

            const confirmPassword =
                document.getElementById("confirmPassword").value;

            if (newPassword !== confirmPassword) {

                errorMessage.textContent =
                    "Passwords do not match!";

                return;
            }

            try {

                const response =
                    await fetch(
                        `/api/v1/Account/reset-password`,
                        {
                            method: 'POST',

                            headers: {
                                'Content-Type':
                                    'application/json'
                            },

                            body: JSON.stringify({
                                token: token,
                                newPassword: newPassword
                            })
                        });

                const result =
                    await response.json();

                if (response.ok) {

                    alert(
                        "Your password has been reset successfully."
                    );

                    window.location.href = "/login";

                } else {

                    errorMessage.textContent =
                        result.message ||
                        "An error occurred.";
                }

            } catch (error) {

                errorMessage.textContent =
                    "Failed to reset password.";
            }

        });

</script>

</body>
</html>
